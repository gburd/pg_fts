name: CI

# Codeberg (Forgejo Actions) push + PR CI. Mirrors .github/workflows/ci.yml:
# build + REGRESS + ISOLATION against PostgreSQL 17 and 18 (PG 19 non-fatal).
#
# Codeberg's runners use `runs-on: docker` with a `container:` image (the same
# pattern as .forgejo/workflows/release.yml), NOT GitHub's `ubuntu-latest`.
# Each matrix leg runs inside the official postgres:<major> image, so the
# server + client are already present; we install the server headers + a C
# toolchain, build with PGXS, and run installcheck against a locally-started
# cluster as the `postgres` OS user.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        pg: [17, 18]
    container:
      image: postgres:${{ matrix.pg }}
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            postgresql-server-dev-${{ matrix.pg }} gcc make git libipc-run-perl ca-certificates

      - uses: actions/checkout@v4

      - name: Build + install
        run: |
          make PG_CONFIG=/usr/bin/pg_config
          make install PG_CONFIG=/usr/bin/pg_config

      - name: Install SQL is pure ASCII (installs on non-UTF-8 servers)
        run: make check-ascii

      - name: Regression + isolation tests
        run: |
          # Start an ephemeral cluster owned by the postgres user (the postgres
          # image runs as root during CI; initdb refuses to run as root, so the
          # cluster + installcheck run via `su postgres`). REGRESS + ISOLATION
          # are the correctness gate; PGXS checks TAP_TESTS with ifdef, so point
          # PROVE_TESTS at ci/noop.pl to make the TAP stage a no-op here (the
          # crash-recovery/replication TAP harness needs its own cluster setup).
          chown -R postgres:postgres .
          su postgres -c '
            /usr/lib/postgresql/${{ matrix.pg }}/bin/initdb -D /tmp/pgdata --no-locale --encoding=UTF8 &&
            /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_ctl -D /tmp/pgdata -o "-k /tmp -c listen_addresses=localhost" -w start &&
            make installcheck PROVE_TESTS=ci/noop.pl PG_CONFIG=/usr/bin/pg_config PGHOST=/tmp PGUSER=postgres
          '

      - name: TAP tests (corruption recovery, server encodings)
        # Only t/003 (torn-page/corruption) + t/004 (server encodings) run here:
        # t/001 (crash recovery) + t/002 (replication) need a PostgreSQL::Test
        # cluster-management setup this container job does not provide, so
        # gating them would fail on harness setup, not on pg_fts.  (The Nix
        # flake tap-pg17/tap-pg18 checks gate exactly these same two.)
        run: |
          chown -R postgres:postgres .
          su postgres -c '
            make installcheck REGRESS= ISOLATION= PROVE_TESTS="t/003_corruption.pl t/004_encodings.pl" PG_CONFIG=/usr/bin/pg_config
          ' || { echo "=== TAP logs ==="; cat tmp_check/log/*.log tmp_check/log/regress_log_* 2>/dev/null | tail -120 || true; exit 1; }

      - name: Show diffs on failure
        if: failure()
        run: |
          for f in regression.diffs output_iso/regression.diffs; do
            [ -f "$f" ] && { echo "=== $f ==="; cat "$f"; }
          done

  # PG 19/devel: not packaged in the postgres:19 image on all registries yet,
  # so this leg is best-effort and never fails the CI run.
  test-pg19:
    runs-on: docker
    container:
      image: postgres:19
    continue-on-error: true
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            postgresql-server-dev-19 gcc make git libipc-run-perl ca-certificates || exit 0
      - uses: actions/checkout@v4
      - name: Build + install + test (non-fatal)
        run: |
          make PG_CONFIG=/usr/bin/pg_config
          make install PG_CONFIG=/usr/bin/pg_config
          chown -R postgres:postgres .
          su postgres -c '
            /usr/lib/postgresql/19/bin/initdb -D /tmp/pgdata --no-locale --encoding=UTF8 &&
            /usr/lib/postgresql/19/bin/pg_ctl -D /tmp/pgdata -o "-k /tmp -c listen_addresses=localhost" -w start &&
            make installcheck PROVE_TESTS=ci/noop.pl PG_CONFIG=/usr/bin/pg_config PGHOST=/tmp PGUSER=postgres
          '

  # --- AddressSanitizer signal (best-effort) ----------------------------------
  # Extra memory-safety signal on the in-process paths; NON-GATING because
  # loading an ASan .so into a stock postmaster is runner-dependent. The GATING
  # memory-safety check is the `fuzz` job. idx_scan_stats is omitted (stats
  # flush timing is unreliable under ASan slowdown; gated by the `test` job).
  sanitizers:
    runs-on: docker
    container:
      image: postgres:17
    continue-on-error: true
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            postgresql-server-dev-17 gcc make git libipc-run-perl ca-certificates
      - uses: actions/checkout@v4
      - name: Build + install with AddressSanitizer (shared runtime)
        run: |
          # -shared-libasan only at LINK time (SHLIB_LINK).
          make PG_CONFIG=/usr/bin/pg_config with_llvm=no \
            COPT="-fsanitize=address -fno-omit-frame-pointer -g -O1 -DUSE_ASSERT_CHECKING" \
            SHLIB_LINK="-fsanitize=address -shared-libasan"
          make install PG_CONFIG=/usr/bin/pg_config
      - name: Regression + isolation under AddressSanitizer
        run: |
          chown -R postgres:postgres .
          ASAN_LIB=$(gcc -print-file-name=libasan.so)
          su postgres -c "
            /usr/lib/postgresql/17/bin/initdb -D /tmp/pgdata --no-locale --encoding=UTF8 &&
            LD_PRELOAD='$ASAN_LIB' ASAN_OPTIONS='detect_leaks=0:abort_on_error=1:print_stacktrace=1:verify_asan_link_order=0' /usr/lib/postgresql/17/bin/pg_ctl -D /tmp/pgdata -o '-k /tmp -c listen_addresses=localhost' -w start &&
            LD_PRELOAD='$ASAN_LIB' ASAN_OPTIONS='detect_leaks=0:abort_on_error=1:print_stacktrace=1:verify_asan_link_order=0' make installcheck REGRESS='pg_fts unicode_fold' PROVE_TESTS=ci/noop.pl PG_CONFIG=/usr/bin/pg_config PGHOST=/tmp PGUSER=postgres
          "
      - name: Show diffs on failure
        if: failure()
        run: |
          for f in regression.diffs output_iso/regression.diffs; do
            [ -f "$f" ] && { echo "=== $f ==="; cat "$f"; }
          done

  # --- Fuzz / corruption harness (ASan+UBSan) ---------------------------------
  fuzz:
    runs-on: docker
    container:
      image: debian:stable-slim
    steps:
      - name: Install clang
        run: apt-get update && apt-get install -y --no-install-recommends clang git ca-certificates bash
      - uses: actions/checkout@v4
      - name: Run fuzz harness
        run: bash test/fuzz/run.sh

  # --- Property-based tests (hegel-c) -----------------------------------------
  # Best-effort (non-gating): hegel-c spawns the `hegel` server (from
  # hegel-core, not an apt package); when it's absent the property tests can't
  # connect.  Build (compile-check) always; run ctest only if a server exists.
  # The fuzz + sanitizer jobs gate the same on-disk parse surface.
  hegel:
    runs-on: docker
    container:
      image: debian:stable-slim
    continue-on-error: true
    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake clang libcmocka-dev libcbor-dev zlib1g-dev git ca-certificates
      - uses: actions/checkout@v4
      - name: Build hegel property tests (compile check)
        run: |
          cmake -S test/hegel -B test/hegel/build \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" >/dev/null
          cmake --build test/hegel/build -j"$(nproc)"
      - name: Run hegel property tests (needs the hegel server)
        run: |
          if command -v hegel >/dev/null 2>&1 || [ -n "${HEGEL_SERVER_COMMAND:-}" ]; then
            ctest --test-dir test/hegel/build --output-on-failure
          else
            echo '::warning::hegel server not available; property tests compiled but not run. The fuzz + sanitizer jobs gate the same surface.'
          fi

  # --- Coverage gate (>= 90% of pg_fts-own sources) ---------------------------
  coverage:
    runs-on: docker
    container:
      image: postgres:17
    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            postgresql-server-dev-17 gcc make git libipc-run-perl lcov ca-certificates
      - uses: actions/checkout@v4
      - name: Measure coverage (gate >= 90% of pg_fts-own sources)
        run: |
          # Run as root: ci/coverage.sh installs the instrumented .so (needs the
          # prefix) then drops to the postgres user for initdb + the test run +
          # .gcda writes (it chowns the tree first).
          COV_MIN=90 PG_CONFIG=/usr/bin/pg_config \
            PGBIN=/usr/lib/postgresql/17/bin bash ci/coverage.sh
