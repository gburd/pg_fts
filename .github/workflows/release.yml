name: Release

# Tag-triggered publish. Cutting a vX.Y.Z tag (on Codeberg; auto-mirrored to
# GitHub) builds+tests the extension, produces the PGXN source-dist zip, attaches
# it to a GitHub Release, and uploads the distribution to PGXN.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the tag + full history for `git archive`

      - name: Install PostgreSQL 17 + server headers
        run: |
          # Remove just the runner's preinstalled Microsoft apt repo (it can
          # serve a broken InRelease and fail `apt-get update`); keep the
          # LLVM/ubuntu repos — postgresql-server-dev depends on clang.
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/microsoft*.sources || true
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-17 postgresql-server-dev-17 gcc make zip libipc-run-perl

      - name: Build + test (gate the release)
        run: |
          PGBIN=/usr/lib/postgresql/17/bin
          make PG_CONFIG=$PGBIN/pg_config
          sudo make install PG_CONFIG=$PGBIN/pg_config
          # REGRESS + ISOLATION are the release gate. PGXS ignores a CLI
          # TAP_TESTS override; PROVE_TESTS points prove at a trivial always-pass
          # file so the TAP stage is a no-op (TAP runs in CI, not required to publish).
          pg_virtualenv -v 17 make installcheck PROVE_TESTS=ci/noop.pl PG_CONFIG=$PGBIN/pg_config

      - name: Build source distribution (PGXN zip)
        id: dist
        run: |
          make dist PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
          echo "zip=pg_fts-${GITHUB_REF_NAME#v}.zip" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.dist.outputs.zip }}

      - name: Publish to PGXN
        env:
          PGXN_USER: ${{ secrets.PGXN_USER }}
          PGXN_PASSWORD: ${{ secrets.PGXN_PASSWORD }}
        run: |
          if [ -z "$PGXN_USER" ] || [ -z "$PGXN_PASSWORD" ]; then
            echo "PGXN_USER/PGXN_PASSWORD secrets not set; skipping PGXN upload." >&2
            exit 0
          fi
          # PGXN Manager upload API: authenticated multipart POST of the dist zip.
          # The distribution name + version are read from META.json inside the zip.
          code=$(curl -sS -o /tmp/pgxn_resp.txt -w '%{http_code}' \
            --user "$PGXN_USER:$PGXN_PASSWORD" \
            -F "archive=@${{ steps.dist.outputs.zip }};type=application/zip" \
            https://manager.pgxn.org/upload)
          echo "PGXN upload HTTP $code"; cat /tmp/pgxn_resp.txt || true
          case "$code" in 2*) : ;; *) echo "PGXN upload failed" >&2; exit 1 ;; esac
