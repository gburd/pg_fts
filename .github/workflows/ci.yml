name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [17, 18, 19]   # 19 = master/devel, may not be packaged yet
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg }} + server headers
        # 19 lives in the pgdg -testing snapshot repo and may be missing entirely
        continue-on-error: ${{ matrix.pg == 19 }}
        run: |
          # The runner's preinstalled Microsoft apt repo intermittently serves a
          # broken InRelease and fails `apt-get update`; remove just that repo
          # (keep the LLVM/ubuntu repos — postgresql-server-dev depends on clang).
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/microsoft*.sources || true
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          if [ "${{ matrix.pg }}" = "19" ]; then
            sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg-testing main 19" > /etc/apt/sources.list.d/pgdg-testing.list'
          fi
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-${{ matrix.pg }} \
            postgresql-server-dev-${{ matrix.pg }} \
            gcc make libipc-run-perl

      - name: Build
        continue-on-error: ${{ matrix.pg == 19 }}
        run: make PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      - name: Install SQL is pure ASCII (installs on non-UTF-8 servers)
        run: make check-ascii

      - name: Install
        continue-on-error: ${{ matrix.pg == 19 }}
        run: sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      - name: Regression + isolation tests
        continue-on-error: ${{ matrix.pg == 19 }}
        run: |
          PGBIN=/usr/lib/postgresql/${{ matrix.pg }}/bin
          # pg_virtualenv (from postgresql-common) spins up an ephemeral cluster
          # of the right major, exports PG* env (PGHOST/PGPORT/PGUSER as a
          # superuser), runs the command, and tears the cluster down. This is
          # the portable way to run `make installcheck` on Debian/pgdg PG.
          # REGRESS + ISOLATION are the correctness gate.  PGXS checks
          # TAP_TESTS with ifdef (a CLI TAP_TESTS=0 is ignored); PROVE_TESTS
          # points prove at a trivial always-pass file (ci/noop.pl) so the TAP
          # stage is a no-op in the gate.  The real TAP run is the next step.
          pg_virtualenv -v ${{ matrix.pg }} \
            make installcheck PROVE_TESTS=ci/noop.pl PG_CONFIG=$PGBIN/pg_config

      - name: TAP tests (corruption recovery, server encodings)
        # Gating on 17/18 (the supported majors); best-effort on 19-devel.
        # Only t/003 (torn-page/corruption) and t/004 (server encodings) run
        # here: t/001 (crash recovery) and t/002 (replication) need a full
        # PostgreSQL::Test cluster-management setup that pg_virtualenv does not
        # provide, so they run locally / are exercised elsewhere -- gating them
        # here would fail on harness setup, not on pg_fts.  (The Nix flake
        # tap-pg17/tap-pg18 checks gate exactly these same two.)
        continue-on-error: ${{ matrix.pg == 19 }}
        run: |
          PGBIN=/usr/lib/postgresql/${{ matrix.pg }}/bin
          pg_virtualenv -v ${{ matrix.pg }} \
            make installcheck REGRESS= ISOLATION= \
              PROVE_TESTS='t/003_corruption.pl t/004_encodings.pl' \
              PG_CONFIG=$PGBIN/pg_config || {
              echo '=== TAP logs ==='
              cat tmp_check/log/*.log tmp_check/log/regress_log_* 2>/dev/null | tail -120 || true
              exit 1
            }

      - name: Show diffs on failure
        if: failure()
        run: |
          for f in regression.diffs output_iso/regression.diffs; do
            [ -f "$f" ] && { echo "=== $f ==="; cat "$f"; }
          done

  # --- AddressSanitizer signal (best-effort) ----------------------------------
  # Builds pg_fts instrumented and runs the regression + isolation suite against
  # a real PG with the ASan runtime preloaded into the backend -- extra signal
  # for memory bugs on the in-process paths.  It is NON-GATING: loading an
  # ASan-instrumented .so into a stock postmaster depends on the runner's gcc
  # supporting -shared-libasan and on preload ordering, which varies by runner.
  # The GATING memory-safety check is the `fuzz` job (standalone ASan+UBSan with
  # planted-bug teeth), which covers the same on-disk parse surface.
  # idx_scan_stats is omitted here: it depends on stats-collector flush timing
  # that is unreliable under ASan slowdown (it is gated by the `test` job).
  sanitizers:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + headers
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/microsoft*.sources || true
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-17 postgresql-server-dev-17 clang make libipc-run-perl
      - name: Build + install with AddressSanitizer (shared runtime)
        run: |
          PGBIN=/usr/lib/postgresql/17/bin
          # -shared-libasan belongs only at LINK time (SHLIB_LINK), so the .so
          # references the SHARED asan runtime and can be loaded into a stock
          # postmaster; gcc's default static asan cannot.  Use clang: the
          # runner's gcc does not accept -shared-libasan (it is a clang flag).
          make CC=clang PG_CONFIG=$PGBIN/pg_config with_llvm=no \
            COPT="-fsanitize=address -fno-omit-frame-pointer -g -O1 -DUSE_ASSERT_CHECKING" \
            SHLIB_LINK="-fsanitize=address -shared-libasan"
          sudo make install PG_CONFIG=$PGBIN/pg_config
      - name: Regression + isolation under AddressSanitizer
        run: |
          PGBIN=/usr/lib/postgresql/17/bin
          # The .so is clang-built, so preload CLANG's libasan (matching the
          # build compiler's runtime) -- gcc's would trip a link-order error.
          ASAN_LIB=$(clang -print-file-name=libclang_rt.asan-x86_64.so)
          test -f "$ASAN_LIB" || ASAN_LIB=$(clang -print-file-name=libasan.so)
          test -f "$ASAN_LIB" || { echo "asan runtime not found ($ASAN_LIB)"; exit 1; }
          # REGRESS overridden to drop the timing-sensitive idx_scan_stats test.
          pg_virtualenv -v 17 env \
            LD_PRELOAD="$ASAN_LIB" \
            ASAN_OPTIONS="detect_leaks=0:abort_on_error=1:print_stacktrace=1:verify_asan_link_order=0" \
            make installcheck REGRESS="pg_fts unicode_fold" PROVE_TESTS=ci/noop.pl PG_CONFIG=$PGBIN/pg_config
      - name: Show diffs on failure
        if: failure()
        run: |
          for f in regression.diffs output_iso/regression.diffs; do
            [ -f "$f" ] && { echo "=== $f ==="; cat "$f"; }
          done

  # --- Fuzz / corruption harness (ASan+UBSan) ---------------------------------
  # Fuzzes the untrusted-on-disk parse surface (FOR codec, fts_doc validator,
  # block-header decode) and asserts the planted-bug teeth builds abort.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends clang
      - name: Run fuzz harness
        run: bash test/fuzz/run.sh

  # --- Property-based tests (hegel-c) -----------------------------------------
  # cmocka + hegel-c (FetchContent) property tests for the pure-C codec +
  # validator.  hegel-c spawns the `hegel` protocol server (from hegel-core,
  # not an apt package) as a subprocess; when that server isn't available on
  # the runner the property tests can't connect, so this job is BEST-EFFORT
  # (non-gating): it builds the suite (a real compile check of the property
  # tests) and runs ctest if a hegel server is present, warning otherwise.
  # The same on-disk parse surface is gated by the fuzz + sanitizer jobs.
  hegel:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libcmocka-dev libcbor-dev zlib1g-dev git
      - name: Build hegel property tests (compile check)
        run: |
          cmake -S test/hegel -B test/hegel/build \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" >/dev/null
          cmake --build test/hegel/build -j"$(nproc)"
      - name: Run hegel property tests (needs the hegel server)
        run: |
          if command -v hegel >/dev/null 2>&1 || [ -n "${HEGEL_SERVER_COMMAND:-}" ]; then
            ctest --test-dir test/hegel/build --output-on-failure
          else
            echo '::warning::hegel server not available on this runner; property tests compiled but not run. Install hegel-core (HEGEL_SERVER_COMMAND) to enable. The fuzz + sanitizer jobs gate the same surface.'
          fi

  # --- Coverage gate (>= 90% of pg_fts-own sources) ---------------------------
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + coverage tooling
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/microsoft*.sources || true
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-17 postgresql-server-dev-17 gcc make libipc-run-perl lcov
      - name: Measure coverage (gate >= 90% of pg_fts-own sources)
        run: |
          PGBIN=/usr/lib/postgresql/17/bin
          # ci/coverage.sh builds with --coverage, runs REGRESS+ISOLATION against
          # a throwaway cluster, and fails if pg_fts-own line coverage < COV_MIN.
          COV_MIN=90 PG_CONFIG=$PGBIN/pg_config PGBIN=$PGBIN \
            COV_HTML=coverage-html bash ci/coverage.sh
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
          if-no-files-found: ignore
